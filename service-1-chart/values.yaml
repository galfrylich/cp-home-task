replicaCount: 1

namespace: email-services

image:
  repository: galfrylich/service-1-api
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  nodePort: 30080

env:
  AWS_REGION: ca-central-1
  SQS_QUEUE_NAME: "dev-email-queue"
  JWT_SSM_PARAM: "/dev/email-service/jwt-secret"

