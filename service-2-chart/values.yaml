replicaCount: 1

namespace: email-services

image:
  repository: galfrylich/service-2-worker
  tag: latest
  pullPolicy: IfNotPresent


env:
  AWS_REGION: ca-central-1
  SQS_QUEUE_NAME: "dev-email-queue"
  # This will be overridden by Terraform output in real deployments.
  S3_BUCKET: "dev-email-payloads-CHANGE-ME"
  POLL_INTERVAL: "10"